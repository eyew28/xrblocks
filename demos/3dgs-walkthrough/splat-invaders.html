<!doctype html>
<html lang="en">
  <head>
    <title>XR Invaders in your Space</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import {SplatMesh, SparkRenderer} from '@sparkjsdev/spark';
      import * as THREE from 'three';
      import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
      import * as xb from 'xrblocks';

      /** Same SPZ asset and transform as `main.js` SPLAT_ASSETS[0]. */
      const SPLAT_SPZ_URL = '3dgs/horse-qvb-trimmed.splat';

      const TIE_FIGHTER_GLB_URL = '../models/low_poly_tie_fighter_star_wars.glb';
      const LEGO_XWING_GLB_URL = '../models/lego_x-wing.glb';
      const DEATH_STAR_GLB_URL = '../models/death_star_2_remake.glb';

      const GAME_STATE = {
        START: 'start',
        PLAYING: 'playing',
        END: 'end'
      };

      class SpaceInvadersApp extends xb.Script {
        constructor() {
          super();
          this.state = GAME_STATE.START;
          this.score = 0;
          this.lives = 5; // Updated to 5 lives
          this.timeLeft = 60;
          this.aliens = [];
          this.bullets = [];
          this.explosions = [];
          this.lastFireTime = 0;
          this.invaderCount = 10;
          this.damageFlashTime = 0;
          
          this.menuPanel = null;
          this.hudPanel = null;
          this.scoreText = null;
          this.timerText = null;
          this.livesText = null;
          this.damageOverlay = null;
          this.gunModelTemplate = null;
          this.alienModelTemplate = null;
          this.deathStarTemplate = null;
          this.deathStarGroup = null;
          this.deathStarHitRadius = 1.8;

          this.listener = new THREE.AudioListener();
        }

        async init() {
          xb.core.camera.add(this.listener);

          this.add(new THREE.HemisphereLight(0x443333, 0x111122, 3));
          const dirLight = new THREE.DirectionalLight(0xffffff, 2);
          dirLight.position.set(1, 3, 2);
          this.add(dirLight);

          const splatMesh = new SplatMesh({url: SPLAT_SPZ_URL});
          await splatMesh.initialized;
          splatMesh.position.set(0, 1.15, -1);
          splatMesh.quaternion.setFromAxisAngle(
            new THREE.Vector3(0, 0, 1),
            Math.PI
          );
          splatMesh.scale.set(.25, .25, .25);

          const sparkRenderer = new SparkRenderer({
            renderer: xb.core.renderer,
            maxStdDev: Math.sqrt(5),
          });
          xb.core.registry.register(new xb.SparkRendererHolder(sparkRenderer));
          xb.add(sparkRenderer);
          this.add(splatMesh);

          this.createRoundStars();
          this.createHUD();
          this.createMenu();
          this.createDamageOverlay();

          await Promise.all([
            this.prepareGunModel(),
            this.prepareAlienModel(),
            this.prepareDeathStarModel(),
          ]);
          this.createGun();

          this.syncUI();
        }

        async loadNormalizedGltf(url, targetMaxDim) {
          const loader = new GLTFLoader();
          const gltf = await loader.loadAsync(url);
          const model = gltf.scene;
          model.updateMatrixWorld(true);
          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z, 1e-6);
          model.scale.setScalar(targetMaxDim / maxDim);
          model.updateMatrixWorld(true);
          const box2 = new THREE.Box3().setFromObject(model);
          model.position.sub(box2.getCenter(new THREE.Vector3()));
          return model;
        }

        async prepareGunModel() {
          this.gunModelTemplate = await this.loadNormalizedGltf(TIE_FIGHTER_GLB_URL, 0.22);
        }

        async prepareAlienModel() {
          this.alienModelTemplate = await this.loadNormalizedGltf(LEGO_XWING_GLB_URL, 0.35);
        }

        async prepareDeathStarModel() {
          this.deathStarTemplate = await this.loadNormalizedGltf(DEATH_STAR_GLB_URL, 3.0);
        }

        spawnDeathStar() {
          if (this.deathStarGroup) {
            this.remove(this.deathStarGroup);
            this.deathStarGroup = null;
          }
          const g = new THREE.Group();
          g.add(this.deathStarTemplate.clone(true));
          g.position.set(0, 1.4, 0);
          this.add(g);
          this.deathStarGroup = g;
          g.updateMatrixWorld(true);
          const box = new THREE.Box3().setFromObject(g);
          const size = box.getSize(new THREE.Vector3());
          this.deathStarHitRadius = 0.5 * Math.max(size.x, size.y, size.z) + 0.45;
        }

        syncUI() {
          if (this.state === GAME_STATE.PLAYING) {
            this.menuPanel.visible = false;
            this.hudPanel.visible = true;
            this.hudPanel.updateLayouts();
            this.gun.visible = true;
          } else {
            this.menuPanel.visible = true;
            this.menuPanel.updateLayouts();
            this.hudPanel.visible = false;
            this.gun.visible = false;
          }
        }

        createDamageOverlay() {
          // Creates a full-screen red plane attached to the camera
          const geo = new THREE.PlaneGeometry(2, 2);
          const mat = new THREE.MeshBasicMaterial({
            color: 0xff0000,
            transparent: true,
            opacity: 0,
            depthTest: false,
            depthWrite: false
          });
          this.damageOverlay = new THREE.Mesh(geo, mat);
          this.damageOverlay.position.z = -0.1; // Very close to camera
          xb.core.camera.add(this.damageOverlay);
        }

        createRoundStars() {
          const vertices = [];
          for (let i = 0; i < 1500; i++) {
            const x = THREE.MathUtils.randFloatSpread(60);
            const y = THREE.MathUtils.randFloatSpread(60);
            const z = THREE.MathUtils.randFloatSpread(60);
            vertices.push(x, y, z);
          }
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
          
          const canvas = document.createElement('canvas');
          canvas.width = 64;
          canvas.height = 64;
          const ctx = canvas.getContext('2d');
          const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
          grad.addColorStop(0, 'white');
          grad.addColorStop(0.5, 'rgba(255,255,255,0.5)');
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, 64, 64);
          
          const texture = new THREE.CanvasTexture(canvas);
          const material = new THREE.PointsMaterial({ 
            color: 0xffffff, 
            size: 0.2, 
            map: texture, 
            transparent: true,
            depthWrite: false 
          });
          this.add(new THREE.Points(geometry, material));
        }

        createHUD() {
          this.hudPanel = new xb.SpatialPanel({
            width: 1.4,
            height: 0.4,
            backgroundColor: '#000000aa',
            showEdge: true
          });
          this.add(this.hudPanel);

          const grid = this.hudPanel.addGrid();
          const row = grid.addRow({ weight: 1.0 });
          this.scoreText = row.addCol({ weight: 0.35 }).addText({ text: 'SCORE: 0', fontSize: 0.07 });
          this.timerText = row.addCol({ weight: 0.25 }).addText({ text: '60s', fontSize: 0.07 });
          this.livesText = row.addCol({ weight: 0.4 }).addText({ text: 'HP: 5', fontSize: 0.07, fontColor: '#ff4444' });
          
          this.hudPanel.updateLayouts();
        }

        createMenu() {
          this.menuPanel = new xb.SpatialPanel({
            width: 1.6,
            height: 1.0,
            backgroundColor: '#111111ee',
            showEdge: true
          });
          this.menuPanel.position.set(0, 1.5, -2.0);
          this.add(this.menuPanel);

          const grid = this.menuPanel.addGrid();
          this.titleText = grid.addRow({ weight: 0.4 }).addText({ 
            text: 'XR INVADERS IN YOUR SPACE', 
            fontSize: 0.1, 
            fontColor: '#00ffff' 
          });

          this.infoText = grid.addRow({ weight: 0.3 }).addText({ 
            text: 'Defend your base! Look 360 degrees.', 
            fontSize: 0.06 
          });

          const btnRow = grid.addRow({ weight: 0.3 });
          this.startBtn = btnRow.addCol({ weight: 1.0 }).addTextButton({
            text: 'START DEFENSE',
            backgroundColor: '#00ffff',
            fontColor: '#000000',
            fontSize: 0.18
          });

          this.startBtn.onTriggered = () => this.startGame();
          this.menuPanel.updateLayouts();
        }

        createGun() {
          const gunGroup = new THREE.Group();
          const gunMesh = this.gunModelTemplate.clone(true);
          gunMesh.rotation.x = -Math.PI / 2;
          gunGroup.add(gunMesh);
          this.gun = gunGroup;
          this.add(this.gun);
        }

        startGame() {
          this.state = GAME_STATE.PLAYING;
          this.score = 0;
          this.timeLeft = 60;
          this.lives = 5;
          this.damageFlashTime = 0;
          
          this.syncUI();

          this.aliens.forEach(a => this.remove(a.mesh));
          this.bullets.forEach(b => this.remove(b.mesh));
          this.aliens = [];
          this.bullets = [];

          this.spawnDeathStar();

          for (let i = 0; i < this.invaderCount; i++) {
            this.spawnAlien();
          }
        }

        spawnAlien() {
          const group = new THREE.Group();
          const invader = this.alienModelTemplate.clone(true);
          group.add(invader);

          const distance = 12 + Math.random() * 5;
          const angle = Math.random() * Math.PI * 2;
          
          group.position.set(
            Math.cos(angle) * distance,
            0.5 + Math.random() * 2,
            Math.sin(angle) * distance
          );

          this.add(group);
          this.aliens.push({
            mesh: group,
            originalPos: group.position.clone(),
            speed: 0.7 + Math.random() * 0.8,
            offset: Math.random() * Math.PI * 2,
            distance: distance
          });
        }

        playSynthSound(freq, type = 'sine', duration = 0.1, volume = 0.1) {
          if (!this.listener.context || this.listener.context.state === 'suspended') return;
          const osc = this.listener.context.createOscillator();
          const gain = this.listener.context.createGain();
          
          osc.type = type;
          osc.frequency.setValueAtTime(freq, this.listener.context.currentTime);
          
          if (type === 'sawtooth') {
             osc.frequency.exponentialRampToValueAtTime(50, this.listener.context.currentTime + duration);
          }
          
          gain.gain.setValueAtTime(volume, this.listener.context.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.listener.context.currentTime + duration);
          
          osc.connect(gain);
          gain.connect(this.listener.context.destination);
          
          osc.start();
          osc.stop(this.listener.context.currentTime + duration);
        }

        fire() {
          if (this.state !== GAME_STATE.PLAYING) return;
          const now = performance.now();
          if (now - this.lastFireTime < 200) return;
          this.lastFireTime = now;

          this.playSynthSound(880, 'sawtooth', 0.15, 0.08);

          const bulletGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.5);
          bulletGeo.rotateX(Math.PI / 2);
          
          const bullet = new THREE.Mesh(bulletGeo, new THREE.MeshBasicMaterial({ color: 0x00ffff }));
          
          const tipPos = new THREE.Vector3(0, 0, -0.2);
          tipPos.applyMatrix4(this.gun.matrixWorld);
          bullet.position.copy(tipPos);

          const forwardDir = new THREE.Vector3(0, 0, -1);
          forwardDir.applyQuaternion(this.gun.quaternion);
          
          const targetPos = bullet.position.clone().add(forwardDir);
          bullet.lookAt(targetPos);

          this.add(bullet);
          this.bullets.push({ mesh: bullet, dir: forwardDir.clone(), life: 1.5 });
        }

        onSelectStart(event) {
          if (this.state === GAME_STATE.PLAYING) {
            this.fire();
          } else {
            if (this.listener.context.state === 'suspended') {
              this.listener.context.resume();
            }
          }
        }

        endGame(title = 'MISSION COMPLETE') {
          this.state = GAME_STATE.END;
          if (this.deathStarGroup) {
            this.remove(this.deathStarGroup);
            this.deathStarGroup = null;
          }
          this.syncUI();

          this.titleText.setText(title);
          this.infoText.setText(`Final Score: ${this.score}`);
          this.startBtn.setText('RESTART DEFENSE');
          this.menuPanel.updateLayouts();
        }

        update() {
          const dt = xb.getDeltaTime();
          const time = performance.now() * 0.001;
          const cam = xb.core.camera;

          const rightController = xb.core.user.controllers[1] || xb.core.user.controllers[0];
          if (rightController) {
            this.gun.position.copy(rightController.position);
            this.gun.quaternion.copy(rightController.quaternion);
          }

          // Smoothly track HUD to player view
          if (this.hudPanel && this.hudPanel.visible) {
            const targetPos = new THREE.Vector3(0, 0.4, -2.5);
            targetPos.applyMatrix4(cam.matrixWorld);
            this.hudPanel.position.lerp(targetPos, 5 * dt);
            this.hudPanel.quaternion.slerp(cam.quaternion, 5 * dt);
          }

          // Handle Damage Flash Overlay
          if (this.damageOverlay) {
            if (this.damageFlashTime > 0) {
              this.damageFlashTime -= dt;
              this.damageOverlay.material.opacity = Math.min(0.4, this.damageFlashTime * 1.5);
            } else {
              this.damageOverlay.material.opacity = 0;
            }
          }

          if (this.state === GAME_STATE.PLAYING) {
            this.timeLeft -= dt;
            if (this.timeLeft <= 0) {
              this.timeLeft = 0;
              this.endGame('TIME EXPIRED');
            }

            if (this.deathStarGroup) {
              this.deathStarGroup.rotation.y += 0.2 * dt;
            }

            // Update UI Strings
            if (this.scoreText) this.scoreText.setText(`SCORE: ${this.score}`);
            if (this.timerText) this.timerText.setText(`${Math.ceil(this.timeLeft)}s`);
            if (this.livesText) this.livesText.setText(`HP: ${this.lives}`);

            // Bullets logic
            for (let i = this.bullets.length - 1; i >= 0; i--) {
              const b = this.bullets[i];
              b.mesh.position.addScaledVector(b.dir, 20 * dt);
              b.life -= dt;
              
              if (b.life <= 0) {
                this.remove(b.mesh);
                this.bullets.splice(i, 1);
                continue;
              }

              for (let j = this.aliens.length - 1; j >= 0; j--) {
                const a = this.aliens[j];
                if (b.mesh.position.distanceTo(a.mesh.position) < 0.6) {
                  this.score += 10;
                  this.createExplosion(a.mesh.position);
                  this.playSynthSound(440, 'sine', 0.1, 0.1);
                  
                  const angle = Math.random() * Math.PI * 2;
                  a.mesh.position.set(Math.cos(angle)*15, 0.5 + Math.random()*2, Math.sin(angle)*15);
                  
                  this.remove(b.mesh);
                  this.bullets.splice(i, 1);
                  break;
                }
              }
            }

            // Invaders fly toward Death Star
            const dsPos = this.deathStarGroup
              ? this.deathStarGroup.position
              : new THREE.Vector3(0, 1.4, 0);
            this.aliens.forEach(a => {
              const toTarget = new THREE.Vector3().subVectors(dsPos, a.mesh.position);
              const len = toTarget.length();
              if (len > 1e-5) {
                toTarget.multiplyScalar(1 / len);
                a.mesh.position.addScaledVector(toTarget, a.speed * dt);
                const perp = new THREE.Vector3(-toTarget.z, 0, toTarget.x);
                if (perp.lengthSq() > 1e-8) {
                  perp.normalize();
                  a.mesh.position.addScaledVector(perp, Math.sin(time * 2 + a.offset) * 0.02);
                }
              }

              if (this.deathStarGroup && a.mesh.position.distanceTo(dsPos) < this.deathStarHitRadius) {
                this.lives--;
                this.damageFlashTime = 0.5;
                this.playSynthSound(120, 'square', 0.25, 0.2);
                const hit = new THREE.Vector3().lerpVectors(a.mesh.position, dsPos, 0.65);
                this.createSmallExplosion(hit);

                if (this.lives <= 0) {
                  this.lives = 0;
                  this.endGame('GAME OVER');
                } else {
                  const angle = Math.random() * Math.PI * 2;
                  a.mesh.position.set(Math.cos(angle) * 15, 0.5 + Math.random() * 2, Math.sin(angle) * 15);
                }
              }
              a.mesh.lookAt(dsPos);
            });
          }

          // Particle update
          for (let i = this.explosions.length - 1; i >= 0; i--) {
            const e = this.explosions[i];
            const expand = e.small ? 9 : 4;
            const fade = e.small ? 5.5 : 3;
            e.mesh.scale.multiplyScalar(1 + dt * expand);
            e.mesh.material.opacity -= dt * fade;
            if (e.mesh.material.opacity <= 0) {
              this.remove(e.mesh);
              this.explosions.splice(i, 1);
            }
          }
        }

        createExplosion(pos) {
          const geo = new THREE.IcosahedronGeometry(0.3, 1);
          const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 1.0 });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.copy(pos);
          this.add(mesh);
          this.explosions.push({ mesh });
        }

        createSmallExplosion(pos) {
          const geo = new THREE.IcosahedronGeometry(0.08, 0);
          const mat = new THREE.MeshBasicMaterial({
            color: 0xff8833,
            transparent: true,
            opacity: 1.0,
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.copy(pos);
          this.add(mesh);
          this.explosions.push({ mesh, small: true });
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const options = new xb.Options();
        options.enableUI();
        options.setAppTitle('XR Invaders in your Space');
        options.simulator.scenePath = null;

        xb.add(new SpaceInvadersApp());
        xb.init(options);
      });
    </script>
  </body>
</html>
